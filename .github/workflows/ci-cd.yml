name: CI/CD Pipeline (Self-Hosted Local)

on:
  push:
    branches:
      - main
      - develop

env:
  DEPLOY_PATH: /usr/local/lifehub/server
  LOCAL_IMAGE_NAME: lifehubserver:local

jobs:
  build-and-deploy:
    name: 🚀 Build & Deploy
    runs-on: [self-hosted,Java-env]

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # 🌟 删掉了本地的 mvn clean package 步骤，直接进入 Docker 构建
      # Dockerfile 里面的 builder 阶段会自动帮我们下载依赖并编译

      - name: 🐳 Build Local Docker Image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "Building Docker image locally..."
          # 让 Docker 去处理一切（编译 + 打包镜像）
          docker build -t ${{ env.LOCAL_IMAGE_NAME }} .

      - name: 🚀 Deploy to Production
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "📂 进入部署目录..."
          cd ${{ env.DEPLOY_PATH }}

          echo "♻️ 重启服务..."
          docker compose up -d --remove-orphans

          echo "🧹 清理旧镜像..."
          docker image prune -f

          echo "✅ 部署完成！"
          docker compose ps